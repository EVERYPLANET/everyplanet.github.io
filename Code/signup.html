<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.4.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.4.1/firebase-analytics.js";
  import { getDatabase,ref,set,child,push,update, onValue } from "https://www.gstatic.com/firebasejs/9.4.1/firebase-database.js";
    
  const firebaseConfig =
  {
    apiKey: "AIzaSyCLUsdPUonXrCFBwFcxzxyEVtSjU-fBebg",
    authDomain: "iosolde-project-16-04-01.firebaseapp.com",
    databaseURL: "https://iosolde-project-16-04-ALT1-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "iosolde-project-16-04-01",
    storageBucket: "iosolde-project-16-04-ALT1.appspot.com",
    messagingSenderId: "750590606689",
    appId: "1:750590606689:web:f30cc2bee05df5db129920",
    measurementId: "G-ZS0XKHPV5T"  
  };

  const app = initializeApp(firebaseConfig);
  
  window.onload = function ()
  {
    document.getElementById("artistSignupButton").onclick = function ()
    {
      var username=document.getElementById("makeusernameIn").value;
      var password=document.getElementById("makepasswordIn").value;
      var email=document.getElementById("emailIn").value;
      var spotify=document.getElementById("spotifyIn").value;
      var picture=document.getElementById("pictureIn").value;
      var genre=document.getElementById("genreIn").value;
      
      if (username == "" || password == "" || email == "" || spotify=="" || picture == "") {
      	document.getElementById("error1").innerHTML = "Ensure all fields are completed!";
        return;
      }

			const myDB = getDatabase();
      const dbRef = ref(myDB, '/artists/');
      onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        const keys = Object.keys(data);
        for (let i = 0; i < keys.length; i++) {              
          const key = keys[i];
          if(username == data[key].username) {
            document.getElementById("error1").innerHTML = "Username already taken!";
            return;
          }       
              
        }
      });

      var emailList = email.split("@");

      if (email.search("@") == -1 || emailList[0].length < 3) {
        document.getElementById("error1").innerHTML = "Invalid Email!";
        return;
      }
      
      
      const record =
      {
        username       : username,
		    email       :	email,
        spotify :	spotify,
        picture  :	picture,
		    genre  :	genre,
        password : password
      };
      
      const newPostKey = push(child(ref(myDB),"/artists/")).key;
      const updates = {};
      
      updates["/artists/" + newPostKey] = record;
      window.alert("New record inserted with key : " + newPostKey);
      
      return update(ref(myDB),updates);
    };  


    document.getElementById("artistsConcertButton").onclick = function ()
    {
      var username=document.getElementById("usernameIn").value;
      var password=document.getElementById("passwordIn").value;
      var tickets=document.getElementById("ticketsIn").value;
      var date=document.getElementById("dateIn").value;
      var location=document.getElementById("locationIn").value;

			if (username == "" || password == "" || date == "" || location=="" || tickets=="") {
      	document.getElementById("error2").innerHTML = "Ensure all fields are completed!";
        return;
      }
      
      const myDB = getDatabase();
			const dbRef = ref(myDB, '/artists/');
      onValue(dbRef, (snapshot2) => {
        const data = snapshot2.val();
        const keys = Object.keys(data);
        for (let i = 0; i < keys.length; i++) {              
          const key = keys[i];
          if(username == data[key].username) {
          	console.log("username verified");
            if (password == data[key].password) {
            	const record =
                {
                  username       : username,
                  location :	location,
                  date  :	date,
                  tickets : tickets
                };

              const newPostKey = push(child(ref(myDB),"/concerts/")).key;
              const updates = {};

              updates["/concerts/" + newPostKey] = record;
              window.alert("New record inserted with key : " + newPostKey);

              return update(ref(myDB),updates);
              document.getElementById("error2").innerHTML = "";
              break;
            }else{
            	document.getElementById("error2").innerHTML = "Invalid email or password!";
              continue;
            }
          }else{
          	document.getElementById("error2").innerHTML = "Invalid email or password!";
            continue;
          }         
        }
      });
    };  
  };

</script>
