    <div class="container border-bottom">
        <h1>
          Concerts In Town
        </h1>
        <p>
          Artist Sign-In/Log-In
        </p>
    </div>


    <div class="accordion">
        <div class="accordion-item">
          <h2 class="accordion-header" id="headingOne">
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
              Artist Sign-up
            </button>
          </h2>
          <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne" data-bs-parent="#accordionExample">
            <div class="accordion-body">
                <div class="mb-3">
                    <label id="username" class="form-label">Username</label>
                    <input id="usernameIn" class="form-control"/>
                  </div>  
                  <div class="mb-3">
                    <label id="email" class="form-label">Email</label>
                    <input id="emailIn" class="form-control"/>
                  </div>
            
                  <div class="mb-3">
                    <label id="spotify" class="form-label">Spotify Link</label>
                    <input id="spotifyIn" class="form-control"/>
                  </div>
                  <div class="mb-3">
                    <label id="picture" class="form-label">Profile Picture Link</label>
                    <input id="pictureIn" class="form-control"/>
                  </div>
                  <div>
                    <label id="genre" class="form-label">Genre</label>
                    <select id="genreIn" class="form-select">
                      <option selected value="Other">Other</option>
                      <option value="Rock">Rock</option>
                      <option value="Pop">Pop</option>
                      <option value="Punk">Punk</option>
                      <option value="Country">Country</option>
                      <option value="Hip Hop">Hip Hop</option>
                      <option value="Funk">Funk</option>
                      <option value="SynthPop">SynthPop</option>
                    </select>
                  </div>
                  <hr/>
                  <div class="mb-3">
                    <button id="signupButton"  class="btn btn-primary">Sign Up</button>
                  </div>
            </div>
          </div>
        </div>
        <div class="accordion-item">
          <h2 class="accordion-header" id="headingTwo">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
              Artist Log-in
            </button>
          </h2>
          <div id="collapseTwo" class="accordion-collapse collapse" aria-labelledby="headingTwo" data-bs-parent="#accordionExample">
            <div class="accordion-body">
                <div class="mb-3">
                    <label id="username" class="form-label">Username</label>
                    <input id="usernameIn" class="form-control"/>
                </div>  
                <div class="mb-3">
                    <label id="password" class="form-label">Password</label>
                    <input id="passwordIn" class="form-control"/>
                </div>
                <hr/>
                <div class="mb-3">
                    <button id="loginButton"  class="btn btn-primary">Login</button>
                </div>
            </div>
          </div>
        </div>
      </div>

<script type="module">

  import { getDatabase,ref,set,child,push,update } from "https://www.gstatic.com/firebasejs/9.4.1/firebase-database.js";
    
  const firebaseConfig =
  {
    apiKey: "AIzaSyCLUsdPUonXrCFBwFcxzxyEVtSjU-fBebg",
    authDomain: "iosolde-project-16-04-01.firebaseapp.com",
    databaseURL: "https://iosolde-project-16-04-ALT1-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "iosolde-project-16-04-01",
    storageBucket: "iosolde-project-16-04-ALT1.appspot.com",

    appId: "1:750590606689:web:f30cc2bee05df5db129920",
    measurementId: "G-ZS0XKHPV5T"  
  };

  const app = initializeApp(firebaseConfig);
  
  window.onload = function ()
  {
    document.getElementById("signupButton").onclick = function ()
    {
      var username=document.getElementById("usernameIn").value;
      var email=document.getElementById("emailIn").value;
      var spotify=document.getElementById("spotifyIn").value;
      var picture=document.getElementById("pictureIn").value;
      var genre=document.getElementById("genreIn").value;
      
      const myDB = getDatabase();
      const record =
      {
        username       : username,
		email       :	email,
        spotify :	spotify,
        picture  :	picture,
		genre  :	genre
      };
      
      const newPostKey = push(child(ref(myDB),"/artists/")).key;
      const updates = {};
      
      updates["/artists/" + newPostKey] = record;
      window.alert("New record inserted with key : " + newPostKey);
      
      return update(ref(myDB),updates);
    };  
  };
</script>
